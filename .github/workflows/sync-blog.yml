name: Sync Blog Posts

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  sync-blog:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Blog Sync API
        run: |
          if [ -z "${{ secrets.APP_URL }}" ]; then
            echo "Error: APP_URL secret is not set in GitHub Repository Secrets."
            exit 1
          fi
          
          echo "Triggering blog sync at ${{ secrets.APP_URL }}/api/sync-blog..."
          response=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST "${{ secrets.APP_URL }}/api/sync-blog" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")
          
          body=$(echo "$response" | sed '/HTTP_STATUS:/d')
          status=$(echo "$response" | grep "HTTP_STATUS:" | cut -d':' -f2)
          
          echo "Response Body: $body"
          echo "HTTP Status Code: $status"
          
          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "Sync API call failed with status $status"
            exit 1
          fi
          
          echo "Successfully triggered blog sync."
